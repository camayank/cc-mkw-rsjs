[build]
builder = "nixpacks"
buildCommand = "wget -q https://github.com/projectdiscovery/nuclei/releases/download/v3.3.7/nuclei_3.3.7_linux_amd64.zip -O /tmp/nuclei.zip && unzip -o /tmp/nuclei.zip -d /usr/local/bin/ && chmod +x /usr/local/bin/nuclei && rm /tmp/nuclei.zip"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8080}"
